<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preparing Download — Solve Energy</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F97316;
      --orange-dim: #7C3A10;
      --bg: #0A0A0A;
      --surface: #141414;
      --border: #222;
      --text: #F5F5F5;
      --muted: #888;
      --success: #22C55E;
      --error: #EF4444;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--orange);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .spinner-wrap {
      margin: 0 auto 28px;
      width: 72px;
      height: 72px;
      position: relative;
    }

    .spinner {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--orange);
      animation: spin 0.9s linear infinite;
    }

    .spinner-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .success-icon {
      width: 72px;
      height: 72px;
      background: rgba(34,197,94,0.1);
      border: 2px solid var(--success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 28px;
    }

    .error-icon {
      width: 72px;
      height: 72px;
      background: rgba(239,68,68,0.1);
      border: 2px solid var(--error);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 28px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      color: var(--text);
    }

    .job-name {
      font-size: 13px;
      color: var(--orange);
      font-weight: 500;
      margin-bottom: 16px;
      min-height: 18px;
    }

    p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 28px;
      text-align: left;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .step.active {
      color: var(--text);
      border-color: var(--orange-dim);
    }

    .step.done {
      color: var(--success);
      border-color: rgba(34,197,94,0.2);
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .step.active .step-dot { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
    .step.done .step-dot { background: var(--success); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
      width: 100%;
      justify-content: center;
    }

    .btn:hover { opacity: 0.88; }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      margin-top: 10px;
      font-size: 13px;
      padding: 10px 20px;
    }

    .timer {
      font-size: 12px;
      color: var(--muted);
      margin-top: 20px;
    }

    #state-processing, #state-ready, #state-error { display: none; }
    #state-processing.active, #state-ready.active, #state-error.active { display: block; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">☀️</div>
    <span class="logo-text">Solve Energy</span>
  </div>

  <!-- PROCESSING STATE -->
  <div id="state-processing">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="spinner-icon">📂</div>
    </div>
    <h1>Preparing your download</h1>
    <div class="job-name" id="job-name-processing"></div>
    <div class="steps">
      <div class="step" id="step-1"><div class="step-dot"></div> Fetching job card details</div>
      <div class="step" id="step-2"><div class="step-dot"></div> Generating job card PDF</div>
      <div class="step" id="step-3"><div class="step-dot"></div> Exporting method statement</div>
      <div class="step" id="step-4"><div class="step-dot"></div> Collecting site survey photos</div>
      <div class="step" id="step-5"><div class="step-dot"></div> Packaging files</div>
    </div>
    <p>This usually takes 30–60 seconds.<br/>Your download will start automatically.</p>
    <div class="timer" id="timer">Elapsed: 0s</div>
  </div>
